<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VÁŠ NÁZEV ZDE</title>
  <style>
    @font-face {
      font-family: 'Gelasio';
      src: url('fonts/Gelasio-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: #0a0806;
      color: #c9a84c;
      font-family: Gelasio, Gelasio, Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 8vw, 3rem);
      font-weight: normal;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      line-height: 1.2;
      color: #c9a84c;
    }

    .textbox {
      font-size: clamp(0.9rem, 3.5vw, 1rem);
      line-height: 1.8;
      color: #a07c38;
      margin-bottom: 2.5rem;
      letter-spacing: 0.04em;
    }

    .verify {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    input[type="text"] {
      width: 100%;
      max-width: 320px;
      padding: 0.85rem 1.1rem;
      font-size: 1rem;
      font-family: Gelasio, Georgia, serif;
      border: 1.5px solid #4a3a1a;
      border-radius: 0;
      outline: none;
      text-align: center;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #c9a84c;
      background: #0f0c08;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder {
      color: #4a3a1a;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    input[type="text"]:focus {
      border-color: #c9a84c;
    }

    input[type="text"].error {
      border-color: #8b2020;
    }

    button {
      padding: 0.85rem 2.5rem;
      font-size: 0.8rem;
      font-family: Gelasio, Georgia, serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: transparent;
      color: #c9a84c;
      border: 1.5px solid #c9a84c;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    button:hover {
      background: #c9a84c;
      color: #0a0806;
    }

    .error-msg {
      font-size: 0.8rem;
      color: #8b2020;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 1.2em;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- NADPIS — změňte tento text -->
    <h1>Váš nadpis zde</h1>

    <!-- TEXTOVÉ POLE — změňte tento text -->
    <p class="textbox">
      Sem patří váš popis nebo zpráva. Nahraďte toto textem, který potřebujete sdělit.
    </p>

    <!-- OVĚŘOVACÍ POLE -->
    <div class="verify">
      <input type="text" id="answer" placeholder="Zadejte odpověď" autocomplete="off" />
      <button onclick="checkAnswer()">Potvrdit</button>
      <p class="error-msg" id="errorMsg">Špatná odpověď. Zkuste to znovu.</p>
    </div>

  </div>

  <script>
    // -----------------------------------------------
    // ZMĚŇTE TYTO DVĚ HODNOTY:
    var CORRECT_ANSWER = "testodpoved";      // odpověď, kterou musí hráči zadat
    var REDIRECT_URL   = "https://bhdev24.github.io/unikovka_trzilu/template-full-2";    // stránka, na kterou se přesměruje po úspěchu
    // -----------------------------------------------

    function checkAnswer() {
      var input = document.getElementById("answer");
      var error = document.getElementById("errorMsg");
      var value = input.value.trim().toUpperCase();

      if (value === CORRECT_ANSWER.toUpperCase()) {
        window.location.href = REDIRECT_URL;
      } else {
        input.classList.add("error");
        error.style.display = "block";
        input.value = "";
        input.focus();
      }
    }

    document.getElementById("answer").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkAnswer();
      document.getElementById("answer").classList.remove("error");
      document.getElementById("errorMsg").style.display = "none";
    });
  </script>
</body>
</html>
